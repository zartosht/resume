<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zartosht Sepideman — Senior Backend Developer</title>
  <meta name="description" content="Senior backend developer specialising in Node.js, TypeScript and NestJS. Building scalable distributed systems, APIs, and data-heavy backend services.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── NAV ─────────────────────────────── -->
  <header id="site-nav" role="banner">
    <div class="nav-wrap">
      <a href="#top" class="nav-logo" aria-label="Home — Zartosht Sepideman">ZS</a>

      <!-- Desktop links (hidden on mobile) -->
      <nav class="nav-links" aria-label="Site navigation">
        <a href="#about"      class="nl" data-s="about">About</a>
        <a href="#experience" class="nl" data-s="experience">Experience</a>
        <a href="#skills"     class="nl" data-s="skills">Skills</a>
        <a href="#education"  class="nl" data-s="education">Education</a>
        <a href="#contact"    class="nl nl-cta" data-s="contact">Contact</a>
      </nav>

      <button class="nav-burger" id="nav-burger" aria-label="Open navigation" aria-expanded="false" aria-controls="nav-overlay">
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- ── FULLSCREEN OVERLAY NAV ────────────── -->
  <div class="nav-overlay" id="nav-overlay" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <button class="overlay-close" id="overlay-close" aria-label="Close navigation">&#10005;</button>
    <nav class="overlay-nav" aria-label="Full navigation">
      <a href="#about">About</a>
      <a href="#experience">Experience</a>
      <a href="#skills">Skills</a>
      <a href="#education">Education</a>
      <a href="#contact">Contact</a>
    </nav>
    <div class="overlay-foot" id="overlay-foot"></div>
  </div>

  <!-- ── HERO ──────────────────────────────── -->
  <section id="top" class="hero" aria-label="Introduction">
    <div class="container">
      <h1 class="hero-name" id="hero-name" aria-label="Zartosht Sepideman"></h1>
      <p class="hero-meta" id="hero-meta"></p>
      <hr class="hero-rule" aria-hidden="true">
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-cta" id="hero-cta"></div>
    </div>
  </section>

  <!-- ── ABOUT ─────────────────────────────── -->
  <section id="about" class="section" aria-labelledby="about-title">
    <div class="container">
      <div class="s-head">
        <span class="s-num" aria-hidden="true">01 —</span>
        <h2 class="s-title" id="about-title">About</h2>
      </div>

      <div class="about-layout">
        <div class="about-img-col">
          <img id="about-img" src="" alt="" class="about-img" loading="lazy">
        </div>
        <div class="about-text-col">
          <blockquote class="about-quote" id="about-quote"></blockquote>
          <div class="about-bio" id="about-bio"></div>
          <div class="about-socials" id="about-socials" role="list" aria-label="Social links"></div>
        </div>
      </div>

      <dl class="about-details" id="about-details" aria-label="Contact details"></dl>
    </div>
  </section>

  <!-- ── EXPERIENCE ────────────────────────── -->
  <section id="experience" class="section section-ruled" aria-labelledby="exp-title">
    <div class="container">
      <div class="s-head">
        <span class="s-num" aria-hidden="true">02 —</span>
        <h2 class="s-title" id="exp-title">Experience</h2>
      </div>
      <ol class="exp-list" id="exp-list" aria-label="Work history"></ol>
    </div>
  </section>

  <!-- ── SKILLS ────────────────────────────── -->
  <section id="skills" class="section" aria-labelledby="skills-title">
    <div class="container">
      <div class="s-head">
        <span class="s-num" aria-hidden="true">03 —</span>
        <h2 class="s-title" id="skills-title">Skills</h2>
      </div>
      <div class="skills-grid" id="skills-grid" role="list" aria-label="Skill categories"></div>
    </div>
  </section>

  <!-- ── EDUCATION ─────────────────────────── -->
  <section id="education" class="section section-ruled" aria-labelledby="edu-title">
    <div class="container">
      <div class="s-head">
        <span class="s-num" aria-hidden="true">04 —</span>
        <h2 class="s-title" id="edu-title">Education</h2>
      </div>
      <div id="edu-list"></div>
    </div>
  </section>

  <!-- ── CONTACT ───────────────────────────── -->
  <section id="contact" class="contact-section" aria-labelledby="contact-title">
    <div class="container">
      <p class="contact-eyebrow">Get in touch</p>
      <h2 class="contact-email-display" id="contact-title">
        <a id="contact-email-link" href="#" class="contact-email-anchor"></a>
      </h2>
      <p class="contact-sub">Open to remote backend roles, consulting, and interesting problems.</p>
      <div class="contact-actions">
        <a href="#" id="contact-mailto-btn" class="cta-btn cta-btn-inv">Send an email</a>
        <a href="cv.pdf" id="contact-dl-btn" download class="cta-btn cta-btn-dl cta-btn-dl-inv" aria-label="Download CV as PDF">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M6.5 1v7M3.5 5.5l3 3 3-3M1 10h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download CV
        </a>
      </div>
      <nav class="contact-socials" id="contact-socials" aria-label="Social links"></nav>
    </div>
    <footer class="site-footer">
      <div class="container">
        <span id="footer-copy"></span>
        <span id="footer-loc"></span>
      </div>
    </footer>
  </section>

  <script src="data/data.js?v=1"></script>
  <script src="js/index.js?v=1"></script>
</body>
</html>
